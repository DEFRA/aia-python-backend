name: Orchestrator CI

on:
  push:
    branches: [main, development]
    paths:
      - "app/orchestrator/**"
      - "app/config.py"
      - "app/models/**"
      - "app/repositories/**"
      - "app/services/**"
      - "app/utils/**"
      - ".github/workflows/orchestrator-ci.yml"
  pull_request:
    branches: [main, development]
    paths:
      - "app/orchestrator/**"
      - "app/config.py"
      - "app/models/**"
      - "app/repositories/**"
      - "app/services/**"
      - "app/utils/**"
      - ".github/workflows/orchestrator-ci.yml"
  workflow_dispatch:

jobs:
  test-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/orchestrator/requirements.txt

      - name: Install orchestrator dependencies
        run: |
          pip install -r app/orchestrator/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run orchestrator tests
        run: pytest -q app/orchestrator/tests/

  build-orchestrator-image:
    runs-on: ubuntu-latest
    needs: test-orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build orchestrator Docker image
        run: docker build -f app/orchestrator/Dockerfile -t aia-orchestrator:ci .
