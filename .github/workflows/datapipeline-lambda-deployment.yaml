name: Deploy Datapipeline Lambda Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: "Lambda function name to deploy"
        required: false
        default: "pocldnaia-KB"
  push:
    branches: [ main ]
    paths:
      - 'app/datapipeline/**'
      - '.github/workflows/datapipeline-lambda-deployment.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/datapipeline/**'
      - '.github/workflows/datapipeline-lambda-deployment.yaml'

jobs:
  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      LAMBDA_FUNCTION_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.function_name || 'pocldnaia-KB' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build deployment package
        run: |
          cd app/datapipeline

          # Clean previous artifacts
          rm -rf package datapipeline-lambda.zip
          mkdir -p package/app/datapipeline

          # Copy application source while preserving full import path expected
          # by relative imports inside src/entrypoints/main.py.
          cp -r src package/app/datapipeline/

          # Copy data folder (policy_sources.json, etc.) for local source feature flag
          cp -r data package/app/datapipeline/

          # Install dependencies (including certifi for public CA certificates)
          pip install -r requirements.txt -t package/

          # Create deployment zip from package root
          cd package && zip -r ../datapipeline-lambda.zip . && cd ..
          
          # Verify structure (src, data, dependencies, and certifi bundle)
          echo "=== Package structure ==="
          unzip -l datapipeline-lambda.zip | grep -E "(app/datapipeline/(src|data)/|certifi)" | head -30
          fi

          # Create deployment zip from package root
          cd package && zip -r ../datapipeline-lambda.zip . && cd ..
          
          # Verify structure
          echo "=== Package structure ===" 
          unzip -l datapipeline-lambda.zip | grep -E "app/datapipeline/(src|data|certs)/" | head -30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://app/datapipeline/datapipeline-lambda.zip \
            --architectures x86_64 \
            --region "$AWS_REGION"

      - name: Wait for code update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"

      - name: Update Lambda configuration
        run: |
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --handler app.datapipeline.src.entrypoints.lambda_function.lambda_handler \
            --runtime python3.12 \
            --timeout 900 \
            --memory-size 2048 \
            --environment "Variables={,
              REQUESTS_CA_BUNDLE=/var/task/certifi/cacert.pem
              DB_HOST=${{ secrets.DATAPIPELINE_DB_HOST }},
              DB_PORT=${{ secrets.DATAPIPELINE_DB_PORT }},
              DB_NAME=${{ secrets.DATAPIPELINE_DB_NAME }},
              DB_USER=${{ secrets.DATAPIPELINE_DB_USER }},
              DB_PASSWORD=${{ secrets.DATAPIPELINE_DB_PASSWORD }},
              DB_SCHEMA=${{ secrets.DATAPIPELINE_DB_SCHEMA }},
              SHAREPOINT_TENANT_ID=${{ secrets.SHAREPOINT_TENANT_ID }},
              SHAREPOINT_CLIENT_ID=${{ secrets.SHAREPOINT_CLIENT_ID }},
              SHAREPOINT_CLIENT_SECRET=${{ secrets.SHAREPOINT_CLIENT_SECRET }},
              MODEL_ID=${{ secrets.DATAPIPELINE_MODEL_ID }},
              REQUESTS_CA_BUNDLE=/var/task/app/datapipeline/certs/global-bundle.pem,
              SSL_CERT_FILE=/var/task/app/datapipeline/certs/global-bundle.pem,
              SHAREPOINT_SSL_VERIFY=true
            }" \
            --region "$AWS_REGION"

      - name: Verify deployment target and code hash
        run: |
          echo "=== AWS target identity ==="
          aws sts get-caller-identity | jq '{Account, Arn}'
          echo "=== Lambda code/config summary ==="
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" | jq '{FunctionName, FunctionArn, LastModified, Version, CodeSha256, Handler, Runtime, MemorySize, Timeout}'

      - name: Verify deployment
        run: |
          echo "=== Lambda function updated ==="
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" | jq '.Handler, .Runtime, .MemorySize, .Timeout'
