name: Deploy Datapipeline Lambda Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: "Lambda function name to deploy"
        required: false
        default: "pocldnaia-KB"
  push:
    branches: [ main ]
    paths:
      - 'app/datapipeline/**'
      - '.github/workflows/datapipeline-lambda-deployment.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/datapipeline/**'
      - '.github/workflows/datapipeline-lambda-deployment.yaml'

jobs:
  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      LAMBDA_FUNCTION_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.function_name || 'pocldnaia-KB' }}
      LAYER_NAME: datapipeline-ca-bundle

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda Layer with certifi
        run: |
          cd app/datapipeline
          
          # Create layer directory structure
          rm -rf layer-package layer-package.zip
          mkdir -p layer-package/python/lib/python3.12/site-packages
          
          # Install certifi into the layer directory
          pip install certifi -t layer-package/python/lib/python3.12/site-packages/
          
          # Create layer zip
          cd layer-package && zip -r ../layer-package.zip . && cd ..
          
          echo "=== Layer package structure ==="
          unzip -l layer-package.zip | grep -E "certifi" | head -10

      - name: Publish Lambda Layer
        run: |
          cd app/datapipeline
          
          # Get the latest layer version if it exists
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region "$AWS_REGION" \
            --query 'LayerVersions[0].Version' \
            --output text 2>/dev/null || echo "0")
          
          # Publish new layer version
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "$LAYER_NAME" \
            --zip-file fileb://layer-package.zip \
            --compatible-runtimes python3.12 \
            --region "$AWS_REGION" \
            --query 'LayerVersionArn' \
            --output text)
          
          echo "Published layer: $LAYER_ARN"
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      - name: Build deployment package
        run: |
          cd app/datapipeline

          # Clean previous artifacts (excluding layer files)
          rm -rf package datapipeline-lambda.zip
          mkdir -p package/app/datapipeline

          # Copy application source while preserving full import path expected
          # by relative imports inside src/entrypoints/main.py.
          cp -r src package/app/datapipeline/

          # Copy data folder (policy_sources.json, etc.) for local source feature flag
          cp -r data package/app/datapipeline/

          # Create deployment zip from package root (NO dependencies—they come from layer)
          cd package && zip -r ../datapipeline-lambda.zip . && cd ..
          
          # Verify structure
          echo "=== Package structure ==="
          unzip -l datapipeline-lambda.zip | grep -E "app/datapipeline/(src|data)/" | head -20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://app/datapipeline/datapipeline-lambda.zip \
            --architectures x86_64 \
            --region "$AWS_REGION"

      - name: Wait for code update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"

      - name: Update Lambda configuration with layer and environment
        run: |
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --handler app.datapipeline.src.entrypoints.lambda_function.lambda_handler \
            --runtime python3.12 \
            --timeout 900 \
            --memory-size 2048 \
            --layers "$LAYER_ARN" \
            --environment "Variables={
              DB_HOST=${{ secrets.DATAPIPELINE_DB_HOST }},
              DB_PORT=${{ secrets.DATAPIPELINE_DB_PORT }},
              DB_NAME=${{ secrets.DATAPIPELINE_DB_NAME }},
              DB_USER=${{ secrets.DATAPIPELINE_DB_USER }},
              DB_PASSWORD=${{ secrets.DATAPIPELINE_DB_PASSWORD }},
              DB_SCHEMA=${{ secrets.DATAPIPELINE_DB_SCHEMA }},
              SHAREPOINT_TENANT_ID=${{ secrets.SHAREPOINT_TENANT_ID }},
              SHAREPOINT_CLIENT_ID=${{ secrets.SHAREPOINT_CLIENT_ID }},
              SHAREPOINT_CLIENT_SECRET=${{ secrets.SHAREPOINT_CLIENT_SECRET }},
              MODEL_ID=${{ secrets.DATAPIPELINE_MODEL_ID }},
              REQUESTS_CA_BUNDLE=/opt/python/lib/python3.12/site-packages/certifi/cacert.pem
            }" \
            --region "$AWS_REGION"

      - name: Verify deployment target and code hash
        run: |
          echo "=== AWS target identity ==="
          aws sts get-caller-identity | jq '{Account, Arn}'
          echo "=== Lambda code/config summary ==="
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" | jq '{FunctionName, FunctionArn, LastModified, Version, CodeSha256, Handler, Runtime, MemorySize, Timeout, Layers}'

      - name: Verify deployment
        run: |
          echo "=== Lambda function updated ==="
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" | jq '.Handler, .Runtime, .MemorySize, .Timeout, .Layers'
