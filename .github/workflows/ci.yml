name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test-root:
    name: Root tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: pytest
        run: pytest -v --tb=short tests/ --ignore=tests/agents_evaluation/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          AWS_DEFAULT_REGION: eu-west-2
          STATUS_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-status
          TASK_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-tasks

  test-orchestrator:
    name: Orchestrator tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/orchestrator/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/orchestrator/requirements.txt
          pip install pytest pytest-asyncio

      - name: pytest
        run: pytest -v --tb=short tests/orchestrator/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          AWS_DEFAULT_REGION: eu-west-2
          STATUS_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-status
          TASK_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-tasks

  test-core-backend:
    name: Core backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/core_backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/core_backend/requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: pytest
        run: pytest -v --tb=short tests/core_backend/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          JWT_SECRET: dummy-secret
          AWS_DEFAULT_REGION: eu-west-2
          S3_BUCKET_NAME: dummy-bucket
          ORCHESTRATOR_URL: http://localhost:8001

  test-agents-evaluation:
    name: Agents evaluation tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/agents/evaluation/requirements.txt

      - name: Install dependencies
        run: pip install -r app/agents/evaluation/requirements-ci.txt

      - name: Ruff — lint
        run: ruff check app/agents/evaluation/src/ tests/agents_evaluation/ app/agents/evaluation/main.py

      - name: Ruff — format check
        run: ruff format --check app/agents/evaluation/src/ tests/agents_evaluation/ app/agents/evaluation/main.py

      - name: mypy — type check
        run: mypy --config-file app/agents/evaluation/pyproject.toml app/agents/evaluation/src/ app/agents/evaluation/main.py

      - name: pytest
        run: pytest -v --tb=short -x tests/agents_evaluation/
        env:
          ANTHROPIC_API_KEY: dummy
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          REDIS_HOST: localhost
