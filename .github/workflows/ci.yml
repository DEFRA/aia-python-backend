name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test-root:
    name: Root tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r app/orchestrator/requirements.txt
          pip install -r app/agent_service/requirements.txt

      - name: pytest
        run: pytest -v --tb=short tests/app_root/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          AWS_DEFAULT_REGION: eu-west-2
          STATUS_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-status
          TASK_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-tasks

  test-orchestrator:
    name: Orchestrator tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/orchestrator/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/orchestrator/requirements.txt
          pip install pytest pytest-asyncio

      - name: pytest
        run: pytest -v --tb=short tests/orchestrator/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          AWS_DEFAULT_REGION: eu-west-2
          ORCHESTRATOR_DEFAULT_AGENT_TYPE: general
          MAX_PRIORITY_ACTIONS: "10"
          S3_UPLOAD_PREFIX: "uploaded_docs"
          STATUS_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-status
          TASK_QUEUE_URL: https://sqs.eu-west-2.amazonaws.com/000000000000/dummy-tasks

  test-core-backend:
    name: Core backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/core_backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/core_backend/requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: pytest
        run: pytest -v --tb=short tests/core_backend/
        env:
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy
          JWT_SECRET: dummy-secret
          AWS_DEFAULT_REGION: eu-west-2
          S3_BUCKET_NAME: dummy-bucket
          ORCHESTRATOR_URL: http://localhost:8001

  test-agent-service:
    name: Agent service tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/agent_service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/agent_service/requirements.txt
          pip install pytest pytest-asyncio pytest-mock ruff mypy

      - name: pytest
        run: pytest -v --tb=short -x tests/agent_service/
        env:
          LLM_PROVIDER: bedrock
          AWS_DEFAULT_REGION: eu-west-2
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          DB_HOST: localhost
          DB_NAME: dummy
          DB_USER: dummy
          DB_PASSWORD: dummy