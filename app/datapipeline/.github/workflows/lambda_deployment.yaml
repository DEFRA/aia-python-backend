name: Deploy Lambda Function

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build deployment package
        run: |
          # Install runtime dependencies with Linux/Lambda-compatible wheels
          pip install -r app/datapipeline/requirements.txt \
            --platform manylinux2014_x86_64 \
            --python-version 3.12 \
            --implementation cp \
            --only-binary=:all: \
            --target package/

          # Copy application source into package root
          cp -r app/datapipeline/src/* package/

          # Zip the package
          cd package && zip -r ../datapipeline-lambda.zip . && cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name aia-datapipeline \
            --zip-file fileb://datapipeline-lambda.zip \
            --architectures x86_64

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name aia-datapipeline

      - name: Update Lambda configuration
        run: |
          aws lambda update-function-configuration \
            --function-name aia-datapipeline \
            --runtime python3.12 \
            --handler lambda_function.lambda_handler \
            --timeout 600 \
            --memory-size 512