services:
  localstack:
    image: localstack/localstack:4.9.2
    ports:
      - "4566:4566" # LocalStack Gateway
      - "4510-4559:4510-4559" # external services port range
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - "${TMPDIR:-/tmp}/localstack:/var/lib/localstack"
      - ./scripts/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ["CMD", "curl", "localhost:4566"]
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  postgres:
    container_name: aia_documents
    image: postgres:16-alpine
    networks:
      - cdp-tenant
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aiauser
      POSTGRES_PASSWORD: Admin123$
      POSTGRES_DB: aia_documents
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiauser -d aia_documents"]
      interval: 5s
      start_period: 5s
      retries: 5
    restart: always

volumes:
  postgres-data:

networks:
  cdp-tenant:
    driver: bridge
