# Pre-commit hook configuration
#
# All hooks use language: system — they run against tools installed in the
# active environment (conda/venv). No GitHub downloads required; works behind
# corporate SSL proxies.
#
# First-time setup:
#   pip install -r requirements-dev.txt
#   pre-commit install
#   pre-commit install --hook-type pre-push
#   detect-secrets scan > .secrets.baseline   # generate allowlist baseline
#
# Run manually:   pre-commit run --all-files
# Single hook:    pre-commit run detect-secrets --all-files
# Update config:  pre-commit autoupdate  (then test + commit)

default_stages: [pre-commit]

repos:
  - repo: local
    hooks:

      # -----------------------------------------------------------------------
      # SECURITY — runs first; blocks the commit if secrets are detected
      # -----------------------------------------------------------------------

      # Baseline-driven scanner. False positives can be allowlisted via:
      #   detect-secrets audit .secrets.baseline
      - id: detect-secrets
        name: "security: detect-secrets"
        entry: detect-secrets-hook
        language: system
        args: [--baseline, .secrets.baseline]
        exclude: "(\\.secrets\\.baseline$|\\.lock$)"

      # Pattern-based scanner for 150+ provider secret types (AWS, Azure, GCP,
      # Stripe, GitHub tokens, connection strings, etc.).
      # Skips gracefully if gitleaks is not installed.
      # Install: brew install gitleaks
      - id: gitleaks
        name: "security: gitleaks (skipped if not installed)"
        entry: bash -c 'if command -v gitleaks &>/dev/null; then gitleaks protect --staged --redact; else echo "[SKIP] gitleaks not installed — brew install gitleaks"; fi'
        language: system
        pass_filenames: false

      # Block PEM private keys
      - id: detect-private-key
        name: "security: detect private key"
        entry: python scripts/hooks/detect_private_key.py
        language: system

      # -----------------------------------------------------------------------
      # BRANCH PROTECTION
      # -----------------------------------------------------------------------

      - id: no-commit-to-main
        name: "branch: no direct commits to main"
        entry: python scripts/hooks/no_commit_to_main.py
        language: system
        pass_filenames: false
        always_run: true

      # -----------------------------------------------------------------------
      # FILE HYGIENE
      # -----------------------------------------------------------------------

      - id: check-merge-conflict
        name: "hygiene: check merge conflict markers"
        entry: python scripts/hooks/check_merge_conflict.py
        language: system

      - id: check-large-files
        name: "hygiene: check for large files (over 500 KB)"
        entry: python scripts/hooks/check_large_files.py
        language: system

      - id: check-yaml
        name: "hygiene: validate YAML"
        entry: python scripts/hooks/check_yaml.py
        language: system
        types: [yaml]

      - id: check-json
        name: "hygiene: validate JSON"
        entry: python scripts/hooks/check_json.py
        language: system
        types: [json]

      - id: check-toml
        name: "hygiene: validate TOML"
        entry: python scripts/hooks/check_toml.py
        language: system
        types: [toml]

      # -----------------------------------------------------------------------
      # FORMAT + LINT  (ruff handles both in one pass)
      # -----------------------------------------------------------------------

      - id: ruff-lint
        name: "lint: ruff check --fix"
        entry: ruff check --fix
        language: system
        types: [python]
        files: "^app/"

      - id: ruff-format
        name: "format: ruff format"
        entry: ruff format
        language: system
        types: [python]
        files: "^app/"

      # -----------------------------------------------------------------------
      # TYPE CHECKING
      # -----------------------------------------------------------------------

      - id: mypy
        name: "types: mypy (evaluation)"
        entry: bash -c 'python -m mypy --config-file app/agents/evaluation/pyproject.toml "$@"' --
        language: system
        types: [python]
        files: "^app/agents/evaluation/(src/|tests/|main\\.py)"

      # -----------------------------------------------------------------------
      # TESTS — pre-push only (avoids slowing every local commit)
      # -----------------------------------------------------------------------

      - id: pytest-evaluation
        name: "test: pytest (evaluation)"
        entry: bash -c 'ANTHROPIC_API_KEY=dummy DB_NAME=dummy DB_USER=dummy DB_PASSWORD=dummy REDIS_HOST=localhost pytest app/agents/evaluation/tests/db app/agents/evaluation/tests/handlers -x --tb=short -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: pytest-datapipeline
        name: "test: pytest (datapipeline)"
        entry: bash -c 'PYTHONPATH=. pytest app/datapipeline/src/tests/ -x --tb=short -q --ignore=app/datapipeline/src/connection_test.py'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
